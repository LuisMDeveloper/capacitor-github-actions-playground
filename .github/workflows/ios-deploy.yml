name: Deploy iOS App (Next.js + Capacitor)

on:
  workflow_dispatch:

jobs:
  build-and-deploy-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js Web App
        run: npm run build

      - name: Sync Capacitor
        run: npm run sync ios

      - name: Setup Ruby (for Fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
